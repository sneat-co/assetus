<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="../assets" />
    </ion-buttons>
    <ion-title>{{ name || 'Asset' }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-list>
    <ion-item>
      <ion-input label="Name" labelPlacement="stacked" [(ngModel)]="name" />
    </ion-item>
    <ion-item>
      <ion-textarea
        label="Description"
        labelPlacement="stacked"
        [(ngModel)]="description"
        autoGrow="true"
      />
    </ion-item>
    <ion-item>
      <ion-select label="Category" labelPlacement="stacked" [(ngModel)]="category">
        @for (o of categoryOptions; track o.value) {
          <ion-select-option [value]="o.value">{{ o.label }}</ion-select-option>
        }
      </ion-select>
    </ion-item>
    <ion-item>
      <ion-select label="Condition" labelPlacement="stacked" [(ngModel)]="condition">
        @for (o of conditionOptions; track o.value) {
          <ion-select-option [value]="o.value">{{ o.label }}</ion-select-option>
        }
      </ion-select>
    </ion-item>
    <ion-item>
      <ion-select label="Visibility" labelPlacement="stacked" [(ngModel)]="visibility">
        @for (o of visibilityOptions; track o.value) {
          <ion-select-option [value]="o.value">{{ o.label }}</ion-select-option>
        }
      </ion-select>
    </ion-item>
  </ion-list>

  <ion-button expand="block" (click)="save()" [disabled]="saving || !name.trim()">
    Save changes
  </ion-button>

  <ion-button expand="block" fill="outline" (click)="transfer()">
    <ion-icon name="swap-horizontal" slot="start" />
    Transfer to another space
  </ion-button>

  <ion-button expand="block" color="medium" fill="outline" (click)="archive()">
    <ion-icon name="archive" slot="start" />
    Archive
  </ion-button>

  <ion-button expand="block" color="danger" fill="outline" (click)="confirmHardDelete()">
    <ion-icon name="trash" slot="start" />
    Delete permanently
  </ion-button>

  <assetus-asset-history-timeline
    [spaceID]="space?.id"
    [assetID]="$assetID()"
  />
</ion-content>

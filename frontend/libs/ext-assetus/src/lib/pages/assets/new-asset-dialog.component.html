<ion-header>
  <ion-toolbar color="light">
    <ion-title>New asset</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="cancel()">Cancel</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>
<ion-content class="ion-padding">
  <ion-list>
    <ion-item>
      <ion-input
        label="Name"
        labelPlacement="stacked"
        [(ngModel)]="name"
        placeholder="e.g. Cordless drill"
        required
      />
    </ion-item>
    <ion-item>
      <ion-select
        label="Category"
        labelPlacement="stacked"
        [(ngModel)]="category"
      >
        @for (o of categoryOptions; track o.value) {
          <ion-select-option [value]="o.value">{{ o.label }}</ion-select-option>
        }
      </ion-select>
    </ion-item>
    <ion-item>
      <ion-select
        label="Condition"
        labelPlacement="stacked"
        [(ngModel)]="condition"
      >
        @for (o of conditionOptions; track o.value) {
          <ion-select-option [value]="o.value">{{ o.label }}</ion-select-option>
        }
      </ion-select>
    </ion-item>
    <ion-item>
      <ion-select
        label="Visibility"
        labelPlacement="stacked"
        [(ngModel)]="visibility"
      >
        @for (o of visibilityOptions; track o.value) {
          <ion-select-option [value]="o.value">{{ o.label }}</ion-select-option>
        }
      </ion-select>
    </ion-item>
    <ion-item>
      <ion-textarea
        label="Description"
        labelPlacement="stacked"
        [(ngModel)]="description"
        autoGrow="true"
      />
    </ion-item>
    <ion-item>
      <ion-input
        label="Location"
        labelPlacement="stacked"
        [(ngModel)]="location"
      />
    </ion-item>
  </ion-list>
  <ion-button
    expand="block"
    (click)="create()"
    [disabled]="creating || !name.trim()"
  >
    Create asset
  </ion-button>
</ion-content>

<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="../assets" />
    </ion-buttons>
    <ion-title>{{ $asset()?.name || 'Asset' }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="edit()">
        <ion-icon name="create" slot="start" />
        Edit
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-list>
    <ion-item>
      <ion-label>
        <p>Name</p>
        <h2>{{ $asset()?.name }}</h2>
      </ion-label>
    </ion-item>
    @if ($asset()?.description) {
      <ion-item>
        <ion-label class="ion-text-wrap">
          <p>Description</p>
          <h2>{{ $asset()?.description }}</h2>
        </ion-label>
      </ion-item>
    }
    <ion-item>
      <ion-label>
        <p>Category</p>
        <h2>{{ $categoryLabel() }}</h2>
      </ion-label>
    </ion-item>
    <ion-item>
      <ion-label>
        <p>Condition</p>
        <h2>{{ $conditionLabel() }}</h2>
      </ion-label>
    </ion-item>
    <ion-item>
      <ion-label>
        <p>Visibility</p>
        <h2>{{ $visibilityLabel() }}</h2>
      </ion-label>
    </ion-item>
  </ion-list>

  <assetus-asset-history-timeline
    [spaceID]="space?.id"
    [assetID]="$assetID()"
  />
</ion-content>
